models:
  clip:
    weight_path: '~/models/clip_reid/csu_f0_eitc.pth'
    vocab_path: '~/models/clip_reid/bpe_simple_vocab_16e6.txt.gz'
  pstr:
    # Also edit data_root and data.test
    config_path: './configs/pstr/tdbaseline.py'
    weight_path: '~/models/pstr_OG/pstr_r50_cuhk_origin.pth'

process:
  tokens_batch_size: 512
  crops_batch_size: 256
  frames_batch_size: 3
  num_workers: 2

eval:
  detection_reid:
    weight: .5

data:
  root_folder: '~/data/csu3'
  annotations: '~/data/csu3/annotations/test.parquet'
  annotations_json: './outputs/test.json'
  frames_folder: '~/data/csu3/test'
  crops_folder: '~/data/csu3/crops'

h5_files:
  crop_features_from_annotations: './outputs/crop-index_to_crop_features_from_annotations.h5'
  crop_features_from_detections: './outputs/frame-id_to_crop_features_from_detections.h5'
  crop_features_from_files: './outputs/crop-index_to_crop_features_from_files.h5'
  detections: './outputs/frame-id_to_detections.h5'
  features_text: './outputs/crop-index_to_features_text.h5'
